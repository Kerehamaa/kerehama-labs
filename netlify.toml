[build]
  publish = "."
  functions = "netlify/functions"

# Chat routes — order matters (admin before wildcard)
[[redirects]]
  from = "/chat/admin"
  to = "/chat/admin.html"
  status = 200
  force = false

[[redirects]]
  from = "/chat/admin/"
  to = "/chat/admin.html"
  status = 200
  force = false

# Chat room — any /chat/<id> serves the room page
[[redirects]]
  from = "/chat/:id"
  to = "/chat/room.html"
  status = 200
  force = false

# SPA-style fallback for sites
[[redirects]]
  from = "/sites/*"
  to = "/sites/index.html"
  status = 200
  force = false

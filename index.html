<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Kerehama Labs — experiments, sites, and tools">
  <title>Kerehama Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0D0E10; --bg-soft: #141617; --fg: #FFFFFF; --muted: #A9ACAF;
      --accent: #06b6d4; --accent-soft: rgba(6,182,212,0.12); --card-border: rgba(255,255,255,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg); color: var(--fg);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: -20% auto auto -25%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle at 30% 30%, rgba(6,182,212,0.25), transparent 70%);
      filter: blur(120px); opacity: 0.45;
      animation: float-pulse 18s ease-in-out infinite alternate;
      pointer-events: none; z-index: 0;
    }
    .cursor-glow {
      position: fixed; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.15), transparent 70%);
      pointer-events: none; z-index: -1; transform: translate(-50%, -50%); filter: blur(40px);
    }
    .portal {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      gap: 2.5rem; padding: 2rem;
      opacity: 0; transform: translateY(35px);
      animation: fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .brand { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .brand .eyebrow { text-transform: uppercase; letter-spacing: 0.25em; font-size: 0.75rem; color: var(--muted); }
    .brand h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 600; line-height: 1.1; }
    .brand h1 span { color: var(--accent); }
    .links {
      display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
    }
    .links a {
      padding: 1.25rem 1.75rem; border: 1px solid var(--card-border); border-radius: 1rem;
      background: var(--bg-soft); color: var(--fg); text-decoration: none;
      font-family: inherit; font-size: 1rem; font-weight: 500;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      gap: 0.4rem; min-width: 220px;
    }
    .links a:hover {
      border-color: var(--accent); transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(6,182,212,0.15);
    }
    .links a .icon { font-size: 1.5rem; }
    .links a strong { font-size: 1.1rem; }
    .link-desc { font-size: 0.8rem; color: var(--muted); font-weight: 400; line-height: 1.4; }
    .footer-note { color: var(--muted); font-size: 0.8rem; opacity: 0.5; }
    .footer-note a { color: var(--muted); text-decoration: underline; }
    .footer-note a:hover { color: var(--accent); }
    @keyframes fade-up { from { opacity: 0; transform: translateY(35px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float-pulse { 0% { opacity: 0.2; transform: scale(1); } 100% { opacity: 0.5; transform: translate3d(60px,40px,0) scale(1.1); } }
    @media (prefers-reduced-motion: reduce) { body::before { animation: none; } .portal { opacity: 1; transform: none; animation: none; } }
  </style>
</head>
<body>
  <div class="cursor-glow" id="cursor-glow"></div>
  <div class="portal">
    <div class="brand">
      <p class="eyebrow">Kerehama Andrews</p>
      <h1>Welcome to <span>Labs</span></h1>
    </div>
    <div class="links">
      <a href="/chat/" class="link-card">
        <span class="icon">💬</span>
        <strong>Chat</strong>
        <span class="link-desc">Start building your site — chat with us to get help and get started</span>
      </a>
    </div>
    <p class="footer-note"><a href="https://kerehama.nz">kerehama.nz</a></p>
  </div>
  <script>
    const glow = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', e => { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });
    if ('ontouchstart' in window) glow.style.display = 'none';
  </script>
</body>
</html>

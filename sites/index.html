<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Kerehama Labs — client demo portal">
  <title>Kerehama Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0D0E10;
      --bg-soft: #141617;
      --fg: #FFFFFF;
      --muted: #A9ACAF;
      --accent: #06b6d4;
      --accent-soft: rgba(6, 182, 212, 0.12);
      --card-border: rgba(255, 255, 255, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: -20% auto auto -25%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle at 30% 30%, rgba(6,182,212,0.25), transparent 70%);
      filter: blur(120px);
      opacity: 0.45;
      animation: float-pulse 18s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    /* Cursor glow */
    .cursor-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.15), transparent 70%);
      pointer-events: none;
      z-index: -1;
      transform: translate(-50%, -50%);
      filter: blur(40px);
    }

    .portal {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      padding: 2rem;
      opacity: 0;
      transform: translateY(35px);
      animation: fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .brand .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .brand h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      line-height: 1.1;
    }

    .brand h1 span {
      color: var(--accent);
    }

    .search-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .input-wrapper {
      width: 100%;
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 1rem 1.35rem;
      border: 1px solid var(--card-border);
      border-radius: 1rem;
      background: var(--bg-soft);
      color: var(--fg);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-wrapper input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .input-wrapper input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .go-btn {
      padding: 0.85rem 2.5rem;
      border: 1px solid var(--accent);
      border-radius: 999px;
      background: transparent;
      color: var(--fg);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .go-btn:hover {
      background: var(--accent);
      color: #050505;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(6, 182, 212, 0.25);
    }

    .error-msg {
      color: #f87171;
      font-size: 0.85rem;
      min-height: 1.2em;
      transition: opacity 0.2s ease;
    }

    .footer-note {
      color: var(--muted);
      font-size: 0.8rem;
      opacity: 0.5;
    }

    .footer-note a {
      color: var(--muted);
      text-decoration: underline;
    }

    .footer-note a:hover {
      color: var(--accent);
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(35px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float-pulse {
      0% { opacity: 0.2; transform: translateZ(0) scale(1); }
      100% { opacity: 0.5; transform: translate3d(60px, 40px, 0) scale(1.1); }
    }

    /* Shake animation for errors */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .shake {
      animation: shake 0.4s ease;
    }

    @media (prefers-reduced-motion: reduce) {
      body::before { animation: none; }
      .portal { opacity: 1; transform: none; animation: none; }
    }
  </style>
</head>
<body>
  <div class="cursor-glow" id="cursor-glow"></div>

  <div class="portal">
    <div class="brand">
      <p class="eyebrow">Kerehama Andrews</p>
      <h1>Welcome to <span>Labs</span></h1>
    </div>

    <form class="search-box" id="site-form">
      <div class="input-wrapper">
        <input
          type="text"
          id="site-input"
          placeholder="Enter site name"
          autocomplete="off"
          autofocus
          spellcheck="false"
        >
      </div>
      <button type="submit" class="go-btn">View Site →</button>
      <p class="error-msg" id="error-msg">&nbsp;</p>
    </form>

    <p class="footer-note"><a href="https://kerehama.nz">kerehama.nz</a></p>
  </div>

  <script>
    // Cursor glow
    const glow = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', e => {
      if (glow) {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
      }
    });
    if ('ontouchstart' in window && glow) glow.style.display = 'none';

    // Form handling
    const form = document.getElementById('site-form');
    const input = document.getElementById('site-input');
    const errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const siteName = input.value.trim().toLowerCase().replace(/[^a-z0-9\-]/g, '');

      if (!siteName) {
        errorMsg.textContent = 'Please enter a site name';
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 400);
        return;
      }

      // Navigate to the site
      window.location.href = '/sites/' + encodeURIComponent(siteName) + '/';
    });

    // Clear error on input
    input.addEventListener('input', () => {
      errorMsg.innerHTML = '&nbsp;';
    });
  </script>
</body>
</html>

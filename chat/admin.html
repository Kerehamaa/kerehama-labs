<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Kerehama Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0D0E10; --bg-soft: #141617; --fg: #FFFFFF; --muted: #A9ACAF;
      --accent: #06b6d4; --accent-soft: rgba(6,182,212,0.12); --card-border: rgba(255,255,255,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg); color: var(--fg);
      display: flex; flex-direction: column;
    }
    body::before {
      content: ''; position: fixed; inset: -20% auto auto -25%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle at 30% 30%, rgba(6,182,212,0.25), transparent 70%);
      filter: blur(120px); opacity: 0.2; pointer-events: none; z-index: 0;
    }

    /* Login */
    .login-screen {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
    }
    .login-box {
      display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
      max-width: 360px; width: 100%; padding: 2rem;
    }
    .login-box h1 { font-size: 1.5rem; font-weight: 600; }
    .login-box h1 span { color: var(--accent); }
    .login-box input {
      width: 100%; padding: 1rem 1.35rem;
      border: 1px solid var(--card-border); border-radius: 1rem;
      background: var(--bg-soft); color: var(--fg);
      font-family: inherit; font-size: 1rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .login-box input::placeholder { color: var(--muted); opacity: 0.6; }
    .login-box button {
      padding: 0.85rem 2.5rem; border: 1px solid var(--accent); border-radius: 999px;
      background: transparent; color: var(--fg); font-family: inherit;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }
    .login-box button:hover { background: var(--accent); color: #050505; transform: translateY(-2px); }
    .login-error { color: #f87171; font-size: 0.85rem; min-height: 1.2em; }

    /* Admin layout */
    .admin-layout { display: none; flex: 1; position: relative; z-index: 1; }
    .admin-layout.active { display: flex; }

    /* Sidebar */
    .sidebar {
      width: 320px; border-right: 1px solid var(--card-border);
      display: flex; flex-direction: column; background: var(--bg-soft);
    }
    .sidebar-header {
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--card-border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-header h2 { font-size: 1rem; font-weight: 600; }
    .sidebar-header h2 span { color: var(--accent); }
    .chat-count { color: var(--muted); font-size: 0.8rem; }
    .chat-list { flex: 1; overflow-y: auto; }
    .chat-item {
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--card-border);
      cursor: pointer; transition: background 0.15s;
    }
    .chat-item:hover { background: rgba(255,255,255,0.03); }
    .chat-item.active { background: var(--accent-soft); border-left: 3px solid var(--accent); }
    .chat-item .name { font-weight: 600; font-size: 0.95rem; }
    .chat-item .email { color: var(--muted); font-size: 0.8rem; margin-top: 0.15rem; }
    .chat-item .time { color: var(--muted); font-size: 0.75rem; margin-top: 0.35rem; }
    .chat-item .unread-badge {
      display: inline-block; background: var(--accent); color: #050505;
      font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.5rem;
      border-radius: 999px; margin-left: 0.5rem;
    }
    .no-chats { padding: 2rem; text-align: center; color: var(--muted); font-size: 0.9rem; }

    /* Chat panel */
    .chat-panel { flex: 1; display: flex; flex-direction: column; }
    .chat-panel-header {
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--card-border);
      background: var(--bg-soft);
    }
    .chat-panel-header h3 { font-size: 1rem; font-weight: 600; }
    .chat-panel-header .email-link { color: var(--accent); font-size: 0.8rem; text-decoration: none; }
    .panel-messages {
      flex: 1; overflow-y: auto; padding: 1.5rem;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .panel-messages::-webkit-scrollbar { width: 6px; }
    .panel-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .msg {
      max-width: 75%; padding: 0.85rem 1.15rem;
      border-radius: 1rem; font-size: 0.95rem; line-height: 1.5;
    }
    .msg.client {
      align-self: flex-start; background: var(--bg-soft);
      border: 1px solid var(--card-border); border-bottom-left-radius: 0.25rem;
    }
    .msg.admin {
      align-self: flex-end; background: var(--accent); color: #050505;
      border-bottom-right-radius: 0.25rem;
    }
    .msg .meta { font-size: 0.7rem; opacity: 0.6; margin-top: 0.35rem; }
    .msg.admin .meta { color: #050505; }
    .panel-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 0.95rem; opacity: 0.5;
    }

    /* Admin input */
    .admin-input {
      display: flex; gap: 0.75rem; padding: 1rem 1.5rem;
      border-top: 1px solid var(--card-border); background: var(--bg-soft);
    }
    .admin-input input {
      flex: 1; padding: 0.85rem 1.15rem;
      border: 1px solid var(--card-border); border-radius: 1rem;
      background: var(--bg); color: var(--fg);
      font-family: inherit; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .admin-input input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .admin-input input::placeholder { color: var(--muted); opacity: 0.5; }
    .admin-input button {
      padding: 0.85rem 1.5rem; border: none; border-radius: 1rem;
      background: var(--accent); color: #050505;
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .admin-input button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* No chat selected */
    .no-selection {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 1rem; opacity: 0.4;
    }

    @media (max-width: 700px) {
      .sidebar { width: 100%; }
      .chat-panel { display: none; }
      .admin-layout.chat-open .sidebar { display: none; }
      .admin-layout.chat-open .chat-panel { display: flex; }
      .mobile-back { display: block !important; }
    }
    .mobile-back { display: none; color: var(--muted); text-decoration: none; font-size: 0.85rem; cursor: pointer; }
    .mobile-back:hover { color: var(--accent); }
  </style>
</head>
<body>

  <!-- Login screen -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <h1>Admin <span>Login</span></h1>
      <input type="password" id="password" placeholder="Password" autofocus>
      <button id="login-btn" onclick="attemptLogin()">Enter →</button>
      <p class="login-error" id="login-error">&nbsp;</p>
    </div>
  </div>

  <!-- Admin layout -->
  <div class="admin-layout" id="admin-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2><span>Chats</span></h2>
        <span class="chat-count" id="chat-count"></span>
      </div>
      <div class="chat-list" id="chat-list">
        <div class="no-chats">Loading…</div>
      </div>
    </div>
    <div class="chat-panel" id="chat-panel">
      <div class="no-selection" id="no-selection">Select a chat to start replying</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://ewlufiwgnnnfwdjoafcu.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3bHVmaXdnbm5uZndkam9hZmN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTI3MTMsImV4cCI6MjA5MDQ4ODcxM30.C8XNhInLONhDYtt0twygGFg0M4sufZI3oyCTeFjoP-Y';
    const ADMIN_PASS = 'Hello123';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    let currentChatId = null;
    let chats = [];

    // Login
    const pwInput = document.getElementById('password');
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

    function attemptLogin() {
      const pw = document.getElementById('password').value;
      if (pw === ADMIN_PASS) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-layout').classList.add('active');
        loadChats();
        subscribeToAll();
      } else {
        document.getElementById('login-error').textContent = 'Wrong password';
      }
    }

    // Check stored session
    if (sessionStorage.getItem('admin_auth') === 'true') {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-layout').classList.add('active');
      loadChats();
      subscribeToAll();
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function timeAgo(ts) {
      const diff = Date.now() - new Date(ts).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      return Math.floor(hrs / 24) + 'd ago';
    }

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    async function loadChats() {
      sessionStorage.setItem('admin_auth', 'true');
      const { data } = await sb
        .from('chats')
        .select('*')
        .order('last_message_at', { ascending: false });

      chats = data || [];
      renderChatList();
    }

    function renderChatList() {
      const list = document.getElementById('chat-list');
      const count = document.getElementById('chat-count');
      count.textContent = chats.length + ' chat' + (chats.length !== 1 ? 's' : '');

      if (chats.length === 0) {
        list.innerHTML = '<div class="no-chats">No chats yet</div>';
        return;
      }

      list.innerHTML = chats.map(c => `
        <div class="chat-item ${c.id === currentChatId ? 'active' : ''}" onclick="openChat('${c.id}')">
          <div class="name">${escapeHtml(c.client_name)}</div>
          <div class="email">${escapeHtml(c.client_email)}</div>
          <div class="time">${timeAgo(c.last_message_at)}</div>
        </div>
      `).join('');
    }

    async function openChat(id) {
      currentChatId = id;
      const chat = chats.find(c => c.id === id);
      const layout = document.getElementById('admin-layout');
      layout.classList.add('chat-open');
      renderChatList();

      const panel = document.getElementById('chat-panel');
      panel.innerHTML = `
        <div class="chat-panel-header">
          <span class="mobile-back" onclick="closeChat()">← Back</span>
          <h3>${escapeHtml(chat.client_name)}</h3>
          <a class="email-link" href="mailto:${escapeHtml(chat.client_email)}">${escapeHtml(chat.client_email)}</a>
        </div>
        <div class="panel-messages" id="panel-messages"></div>
        <div class="admin-input">
          <input type="text" id="admin-msg" placeholder="Reply…" autocomplete="off">
          <button id="admin-send" onclick="sendAdminMsg()">Send</button>
        </div>
      `;

      const msgInput = document.getElementById('admin-msg');
      msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendAdminMsg(); });
      msgInput.focus();

      // Load messages
      const { data: msgs } = await sb
        .from('messages')
        .select('*')
        .eq('chat_id', id)
        .order('created_at', { ascending: true });

      const container = document.getElementById('panel-messages');
      if (!msgs || msgs.length === 0) {
        container.innerHTML = '<div class="panel-empty">No messages yet</div>';
      } else {
        container.innerHTML = msgs.map(m => `
          <div class="msg ${m.sender}">
            <div class="text">${escapeHtml(m.content)}</div>
            <div class="meta">${m.sender === 'client' ? escapeHtml(chat.client_name) : 'You'} · ${formatTime(m.created_at)}</div>
          </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
      }
    }

    function closeChat() {
      currentChatId = null;
      document.getElementById('admin-layout').classList.remove('chat-open');
      document.getElementById('chat-panel').innerHTML = '<div class="no-selection">Select a chat to start replying</div>';
      renderChatList();
    }

    async function sendAdminMsg() {
      const input = document.getElementById('admin-msg');
      const btn = document.getElementById('admin-send');
      const text = input.value.trim();
      if (!text || !currentChatId) return;

      btn.disabled = true;
      input.value = '';

      await sb.from('messages').insert({ chat_id: currentChatId, sender: 'admin', content: text });
      await sb.from('chats').update({ last_message_at: new Date().toISOString() }).eq('id', currentChatId);

      btn.disabled = false;
      input.focus();
    }

    // Real-time: subscribe to ALL new messages
    function subscribeToAll() {
      sb.channel('admin-all-messages')
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'messages'
        }, (payload) => {
          const msg = payload.new;

          // Update chat list timestamp
          const chat = chats.find(c => c.id === msg.chat_id);
          if (chat) {
            chat.last_message_at = msg.created_at;
            chats.sort((a, b) => new Date(b.last_message_at) - new Date(a.last_message_at));
            renderChatList();
          }

          // If this chat is open, append the message
          if (msg.chat_id === currentChatId) {
            const container = document.getElementById('panel-messages');
            if (!container) return;
            const empty = container.querySelector('.panel-empty');
            if (empty) empty.remove();

            const chatInfo = chats.find(c => c.id === currentChatId);
            const div = document.createElement('div');
            div.className = `msg ${msg.sender}`;
            div.innerHTML = `
              <div class="text">${escapeHtml(msg.content)}</div>
              <div class="meta">${msg.sender === 'client' ? escapeHtml(chatInfo?.client_name || 'Client') : 'You'} · ${formatTime(msg.created_at)}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
          }
        })
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'chats'
        }, (payload) => {
          chats.unshift(payload.new);
          renderChatList();
        })
        .subscribe();
    }
  </script>
</body>
</html>

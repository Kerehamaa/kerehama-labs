<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Kerehama Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0D0E10; --bg-soft: #141617; --fg: #FFFFFF; --muted: #A9ACAF;
      --accent: #06b6d4; --accent-soft: rgba(6,182,212,0.12); --card-border: rgba(255,255,255,0.06);
      --danger: #f87171; --danger-soft: rgba(248,113,113,0.12);
      --success: #4ade80; --success-soft: rgba(74,222,128,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg); color: var(--fg);
      display: flex; flex-direction: column;
    }
    body::before {
      content: ''; position: fixed; inset: -20% auto auto -25%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle at 30% 30%, rgba(6,182,212,0.25), transparent 70%);
      filter: blur(120px); opacity: 0.15; pointer-events: none; z-index: 0;
    }

    /* Login */
    .login-screen {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
    }
    .login-box {
      display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
      max-width: 360px; width: 100%; padding: 2rem;
    }
    .login-box h1 { font-size: 1.5rem; font-weight: 600; }
    .login-box h1 span { color: var(--accent); }
    .login-box input {
      width: 100%; padding: 1rem 1.35rem;
      border: 1px solid var(--card-border); border-radius: 1rem;
      background: var(--bg-soft); color: var(--fg);
      font-family: inherit; font-size: 1rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .login-box input::placeholder { color: var(--muted); opacity: 0.6; }
    .btn-primary {
      padding: 0.85rem 2.5rem; border: 1px solid var(--accent); border-radius: 999px;
      background: transparent; color: var(--fg); font-family: inherit;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.2s;
    }
    .btn-primary:hover { background: var(--accent); color: #050505; transform: translateY(-2px); }
    .login-error { color: var(--danger); font-size: 0.85rem; min-height: 1.2em; }

    /* Admin layout */
    .admin-layout { display: none; flex: 1; position: relative; z-index: 1; overflow: hidden; }
    .admin-layout.active { display: flex; }

    /* Sidebar */
    .sidebar {
      width: 340px; min-width: 340px; border-right: 1px solid var(--card-border);
      display: flex; flex-direction: column; background: var(--bg-soft);
    }
    .sidebar-header {
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--card-border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-header h2 { font-size: 1rem; font-weight: 600; }
    .sidebar-header h2 span { color: var(--accent); }
    .chat-count { color: var(--muted); font-size: 0.8rem; }

    .sidebar-search {
      padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--card-border);
    }
    .sidebar-search input {
      width: 100%; padding: 0.6rem 1rem;
      border: 1px solid var(--card-border); border-radius: 0.75rem;
      background: var(--bg); color: var(--fg);
      font-family: inherit; font-size: 0.85rem; outline: none;
      transition: border-color 0.2s;
    }
    .sidebar-search input:focus { border-color: var(--accent); }
    .sidebar-search input::placeholder { color: var(--muted); opacity: 0.5; }

    .chat-list { flex: 1; overflow-y: auto; }
    .chat-list::-webkit-scrollbar { width: 5px; }
    .chat-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .chat-item {
      padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--card-border);
      cursor: pointer; transition: background 0.15s;
    }
    .chat-item:hover { background: rgba(255,255,255,0.03); }
    .chat-item.active { background: var(--accent-soft); border-left: 3px solid var(--accent); }
    .chat-item .top-row { display: flex; justify-content: space-between; align-items: center; }
    .chat-item .name { font-weight: 600; font-size: 0.95rem; }
    .chat-item .display-name { color: var(--accent); font-size: 0.75rem; }
    .chat-item .email { color: var(--muted); font-size: 0.8rem; margin-top: 0.1rem; }
    .chat-item .time { color: var(--muted); font-size: 0.7rem; }
    .chat-item .tags { display: flex; gap: 0.35rem; margin-top: 0.35rem; flex-wrap: wrap; }
    .tag {
      display: inline-block; font-size: 0.65rem; font-weight: 600;
      padding: 0.15rem 0.5rem; border-radius: 999px;
      background: var(--accent-soft); color: var(--accent);
    }
    .no-chats { padding: 2rem; text-align: center; color: var(--muted); font-size: 0.9rem; }

    /* Chat panel */
    .chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .chat-panel-header {
      padding: 0.85rem 1.5rem; border-bottom: 1px solid var(--card-border);
      background: var(--bg-soft); display: flex; justify-content: space-between; align-items: center;
    }
    .chat-panel-header .left { display: flex; flex-direction: column; gap: 0.15rem; }
    .chat-panel-header h3 { font-size: 1rem; font-weight: 600; }
    .chat-panel-header .email-link { color: var(--accent); font-size: 0.8rem; text-decoration: none; }
    .chat-panel-header .actions { display: flex; gap: 0.5rem; }
    .icon-btn {
      width: 36px; height: 36px; border: 1px solid var(--card-border); border-radius: 0.5rem;
      background: transparent; color: var(--muted); font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

    /* Messages */
    .panel-messages {
      flex: 1; overflow-y: auto; padding: 1.5rem;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .panel-messages::-webkit-scrollbar { width: 6px; }
    .panel-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .msg {
      max-width: 75%; padding: 0.85rem 1.15rem;
      border-radius: 1rem; font-size: 0.95rem; line-height: 1.5;
      word-wrap: break-word; animation: msg-in 0.3s ease;
    }
    .msg.client {
      align-self: flex-start; background: var(--bg-soft);
      border: 1px solid var(--card-border); border-bottom-left-radius: 0.25rem;
    }
    .msg.admin {
      align-self: flex-end; background: var(--accent); color: #050505;
      border-bottom-right-radius: 0.25rem;
    }
    .msg .meta { font-size: 0.7rem; opacity: 0.6; margin-top: 0.35rem; }
    .msg.admin .meta { color: #050505; }
    .panel-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 0.95rem; opacity: 0.5;
    }

    /* Admin input */
    .admin-input {
      display: flex; gap: 0.75rem; padding: 1rem 1.5rem;
      border-top: 1px solid var(--card-border); background: var(--bg-soft);
    }
    .admin-input input {
      flex: 1; padding: 0.85rem 1.15rem;
      border: 1px solid var(--card-border); border-radius: 1rem;
      background: var(--bg); color: var(--fg);
      font-family: inherit; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .admin-input input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .admin-input input::placeholder { color: var(--muted); opacity: 0.5; }
    .admin-input button {
      padding: 0.85rem 1.5rem; border: none; border-radius: 1rem;
      background: var(--accent); color: #050505;
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .admin-input button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Detail drawer / modal */
    .drawer-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 100; align-items: center; justify-content: center;
    }
    .drawer-overlay.open { display: flex; }
    .drawer {
      background: var(--bg-soft); border: 1px solid var(--card-border);
      border-radius: 1.25rem; width: 90%; max-width: 480px;
      padding: 2rem; display: flex; flex-direction: column; gap: 1.25rem;
      max-height: 90vh; overflow-y: auto;
    }
    .drawer h3 { font-size: 1.1rem; font-weight: 600; }
    .drawer h3 span { color: var(--accent); }
    .drawer label { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.25rem; display: block; }
    .drawer input, .drawer textarea {
      width: 100%; padding: 0.75rem 1rem;
      border: 1px solid var(--card-border); border-radius: 0.75rem;
      background: var(--bg); color: var(--fg);
      font-family: inherit; font-size: 0.9rem; outline: none;
      transition: border-color 0.2s;
    }
    .drawer input:focus, .drawer textarea:focus { border-color: var(--accent); }
    .drawer textarea { resize: vertical; min-height: 80px; }
    .drawer .field { display: flex; flex-direction: column; }
    .drawer .row { display: flex; gap: 0.75rem; }
    .drawer .row .field { flex: 1; }
    .drawer .btn-row { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 0.5rem; }
    .btn-save {
      padding: 0.7rem 1.75rem; border: none; border-radius: 999px;
      background: var(--accent); color: #050505;
      font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: transform 0.2s;
    }
    .btn-save:hover { transform: translateY(-1px); }
    .btn-cancel {
      padding: 0.7rem 1.75rem; border: 1px solid var(--card-border); border-radius: 999px;
      background: transparent; color: var(--muted);
      font-family: inherit; font-size: 0.9rem; cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-cancel:hover { border-color: var(--muted); }
    .btn-delete {
      padding: 0.7rem 1.75rem; border: 1px solid var(--danger); border-radius: 999px;
      background: transparent; color: var(--danger);
      font-family: inherit; font-size: 0.9rem; cursor: pointer; margin-right: auto;
      transition: background 0.2s, color 0.2s;
    }
    .btn-delete:hover { background: var(--danger); color: #050505; }
    .drawer .info-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); }
    .drawer .chat-link { color: var(--accent); font-size: 0.8rem; word-break: break-all; }

    .no-selection {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 1rem; opacity: 0.4;
    }

    .mobile-back { display: none; color: var(--muted); text-decoration: none; font-size: 0.85rem; cursor: pointer; }
    .mobile-back:hover { color: var(--accent); }

    @media (max-width: 700px) {
      .sidebar { width: 100%; min-width: unset; }
      .chat-panel { display: none; }
      .admin-layout.chat-open .sidebar { display: none; }
      .admin-layout.chat-open .chat-panel { display: flex; }
      .mobile-back { display: block !important; }
    }

    @keyframes msg-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <h1>Admin <span>Login</span></h1>
      <input type="password" id="password" placeholder="Password" autofocus>
      <button class="btn-primary" onclick="attemptLogin()">Enter →</button>
      <p class="login-error" id="login-error">&nbsp;</p>
    </div>
  </div>

  <!-- Admin -->
  <div class="admin-layout" id="admin-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2><span>Chats</span></h2>
        <span class="chat-count" id="chat-count"></span>
      </div>
      <div class="sidebar-search">
        <input type="text" id="search-input" placeholder="Search chats…" autocomplete="off">
      </div>
      <div class="chat-list" id="chat-list">
        <div class="no-chats">Loading…</div>
      </div>
    </div>
    <div class="chat-panel" id="chat-panel">
      <div class="no-selection" id="no-selection">Select a chat to start replying</div>
    </div>
  </div>

  <!-- Detail drawer -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="if(event.target===this)closeDrawer()">
    <div class="drawer" id="drawer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://ewlufiwgnnnfwdjoafcu.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3bHVmaXdnbm5uZndkam9hZmN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTI3MTMsImV4cCI6MjA5MDQ4ODcxM30.C8XNhInLONhDYtt0twygGFg0M4sufZI3oyCTeFjoP-Y';
    const ADMIN_PASS = 'Hello123';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    let currentChatId = null;
    let chats = [];
    let searchTerm = '';
    const renderedMsgIds = new Set();

    // Login
    const pwInput = document.getElementById('password');
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

    function attemptLogin() {
      if (document.getElementById('password').value === ADMIN_PASS) {
        sessionStorage.setItem('admin_auth', 'true');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-layout').classList.add('active');
        loadChats();
        subscribeToAll();
      } else {
        document.getElementById('login-error').textContent = 'Wrong password';
      }
    }

    if (sessionStorage.getItem('admin_auth') === 'true') {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-layout').classList.add('active');
      loadChats();
      subscribeToAll();
    }

    function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
    function timeAgo(ts) {
      const m = Math.floor((Date.now() - new Date(ts).getTime()) / 60000);
      if (m < 1) return 'now';
      if (m < 60) return m + 'm';
      const h = Math.floor(m / 60);
      if (h < 24) return h + 'h';
      return Math.floor(h / 24) + 'd';
    }
    function formatTime(ts) { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
    function displayName(chat) { return chat.display_name || chat.client_name; }

    // Search
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchTerm = e.target.value.toLowerCase();
      renderChatList();
    });

    async function loadChats() {
      const { data } = await sb.from('chats').select('*').order('last_message_at', { ascending: false });
      chats = data || [];
      renderChatList();
    }

    function getFilteredChats() {
      if (!searchTerm) return chats;
      return chats.filter(c =>
        (c.client_name || '').toLowerCase().includes(searchTerm) ||
        (c.display_name || '').toLowerCase().includes(searchTerm) ||
        (c.client_email || '').toLowerCase().includes(searchTerm) ||
        (c.tags || []).some(t => t.toLowerCase().includes(searchTerm))
      );
    }

    function renderChatList() {
      const list = document.getElementById('chat-list');
      const count = document.getElementById('chat-count');
      const filtered = getFilteredChats();
      count.textContent = filtered.length + ' chat' + (filtered.length !== 1 ? 's' : '');

      if (filtered.length === 0) {
        list.innerHTML = `<div class="no-chats">${searchTerm ? 'No matches' : 'No chats yet'}</div>`;
        return;
      }

      list.innerHTML = filtered.map(c => `
        <div class="chat-item ${c.id === currentChatId ? 'active' : ''}" onclick="openChat('${c.id}')">
          <div class="top-row">
            <div>
              <div class="name">${esc(displayName(c))}${c.display_name ? ` <span class="display-name">(${esc(c.client_name)})</span>` : ''}</div>
              <div class="email">${esc(c.client_email)}</div>
            </div>
            <span class="time">${timeAgo(c.last_message_at)}</span>
          </div>
          ${(c.tags && c.tags.length) ? `<div class="tags">${c.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
        </div>
      `).join('');
    }

    async function openChat(id) {
      currentChatId = id;
      renderedMsgIds.clear();
      const chat = chats.find(c => c.id === id);
      document.getElementById('admin-layout').classList.add('chat-open');
      renderChatList();

      const panel = document.getElementById('chat-panel');
      panel.innerHTML = `
        <div class="chat-panel-header">
          <div class="left">
            <span class="mobile-back" onclick="closeChat()">← Back</span>
            <h3>${esc(displayName(chat))}</h3>
            <a class="email-link" href="mailto:${esc(chat.client_email)}">${esc(chat.client_email)}</a>
          </div>
          <div class="actions">
            <button class="icon-btn" onclick="openDrawer('${id}')" title="Edit details">✏️</button>
            <button class="icon-btn" onclick="copyLink('${id}')" title="Copy chat link">🔗</button>
          </div>
        </div>
        <div class="panel-messages" id="panel-messages"></div>
        <div class="admin-input">
          <input type="text" id="admin-msg" placeholder="Reply as Kerehama…" autocomplete="off">
          <button id="admin-send" onclick="sendAdminMsg()">Send</button>
        </div>
      `;

      document.getElementById('admin-msg').addEventListener('keydown', e => { if (e.key === 'Enter') sendAdminMsg(); });
      document.getElementById('admin-msg').focus();

      const { data: msgs } = await sb
        .from('messages').select('*').eq('chat_id', id).order('created_at', { ascending: true });

      const container = document.getElementById('panel-messages');
      if (!msgs || msgs.length === 0) {
        container.innerHTML = '<div class="panel-empty">No messages yet</div>';
      } else {
        container.innerHTML = '';
        msgs.forEach(m => appendAdminMsg(m, chat));
        container.scrollTop = container.scrollHeight;
      }
    }

    function appendAdminMsg(m, chat) {
      if (renderedMsgIds.has(m.id)) return;
      renderedMsgIds.add(m.id);
      const container = document.getElementById('panel-messages');
      if (!container) return;
      const empty = container.querySelector('.panel-empty');
      if (empty) empty.remove();

      const div = document.createElement('div');
      div.className = `msg ${m.sender}`;
      div.innerHTML = `
        <div class="text">${esc(m.content)}</div>
        <div class="meta">${m.sender === 'client' ? esc(chat?.client_name || 'Client') : 'You'} · ${formatTime(m.created_at)}</div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function closeChat() {
      currentChatId = null;
      renderedMsgIds.clear();
      document.getElementById('admin-layout').classList.remove('chat-open');
      document.getElementById('chat-panel').innerHTML = '<div class="no-selection">Select a chat to start replying</div>';
      renderChatList();
    }

    async function sendAdminMsg() {
      const input = document.getElementById('admin-msg');
      const btn = document.getElementById('admin-send');
      const text = input.value.trim();
      if (!text || !currentChatId) return;

      btn.disabled = true;
      input.value = '';

      const { data, error } = await sb.from('messages')
        .insert({ chat_id: currentChatId, sender: 'admin', content: text })
        .select().single();

      if (error) {
        input.value = text;
        alert('Failed to send');
      } else if (data) {
        const chat = chats.find(c => c.id === currentChatId);
        appendAdminMsg(data, chat);
      }

      await sb.from('chats').update({ last_message_at: new Date().toISOString() }).eq('id', currentChatId);

      btn.disabled = false;
      input.focus();
    }

    function copyLink(id) {
      navigator.clipboard.writeText(`https://labs.kerehama.nz/chat/${id}`);
      // Brief visual feedback
      const btn = event.target.closest('.icon-btn');
      btn.textContent = '✅';
      setTimeout(() => btn.textContent = '🔗', 1500);
    }

    // Detail drawer
    function openDrawer(id) {
      const chat = chats.find(c => c.id === id);
      if (!chat) return;

      document.getElementById('drawer').innerHTML = `
        <h3>Edit <span>${esc(chat.client_name)}</span></h3>

        <div class="info-row">
          <span>Created: ${new Date(chat.created_at).toLocaleDateString()}</span>
          <span>Last active: ${timeAgo(chat.last_message_at)} ago</span>
        </div>
        <div class="chat-link">🔗 https://labs.kerehama.nz/chat/${chat.id}</div>

        <div class="row">
          <div class="field">
            <label>Display Name</label>
            <input type="text" id="d-display-name" value="${esc(chat.display_name || '')}" placeholder="Override name…">
          </div>
          <div class="field">
            <label>Original Name</label>
            <input type="text" value="${esc(chat.client_name)}" disabled style="opacity:0.5;">
          </div>
        </div>

        <div class="field">
          <label>Tags (comma separated)</label>
          <input type="text" id="d-tags" value="${esc((chat.tags || []).join(', '))}" placeholder="e.g. client, urgent, friend">
        </div>

        <div class="field">
          <label>Notes</label>
          <textarea id="d-notes" placeholder="Add private notes about this person…">${esc(chat.notes || '')}</textarea>
        </div>

        <div class="btn-row">
          <button class="btn-delete" onclick="deleteChat('${chat.id}')">Delete Chat</button>
          <button class="btn-cancel" onclick="closeDrawer()">Cancel</button>
          <button class="btn-save" onclick="saveDrawer('${chat.id}')">Save</button>
        </div>
      `;
      document.getElementById('drawer-overlay').classList.add('open');
    }

    function closeDrawer() {
      document.getElementById('drawer-overlay').classList.remove('open');
    }

    async function saveDrawer(id) {
      const displayName = document.getElementById('d-display-name').value.trim();
      const tagsRaw = document.getElementById('d-tags').value;
      const notes = document.getElementById('d-notes').value;
      const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

      await sb.from('chats').update({
        display_name: displayName || null,
        tags,
        notes
      }).eq('id', id);

      // Update local
      const chat = chats.find(c => c.id === id);
      if (chat) { chat.display_name = displayName || null; chat.tags = tags; chat.notes = notes; }

      closeDrawer();
      renderChatList();
      if (currentChatId === id) openChat(id);
    }

    async function deleteChat(id) {
      if (!confirm('Delete this chat and all messages? This cannot be undone.')) return;

      await sb.from('messages').delete().eq('chat_id', id);
      await sb.from('chats').delete().eq('id', id);

      chats = chats.filter(c => c.id !== id);
      closeDrawer();
      if (currentChatId === id) closeChat();
      renderChatList();
    }

    // Real-time
    function subscribeToAll() {
      sb.channel('admin-all')
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'messages'
        }, (payload) => {
          const msg = payload.new;
          const chat = chats.find(c => c.id === msg.chat_id);
          if (chat) {
            chat.last_message_at = msg.created_at;
            chats.sort((a, b) => new Date(b.last_message_at) - new Date(a.last_message_at));
            renderChatList();
          }
          if (msg.chat_id === currentChatId) {
            appendAdminMsg(msg, chat);
          }
        })
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'chats'
        }, (payload) => {
          chats.unshift(payload.new);
          renderChatList();
        })
        .subscribe();
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <link rel="manifest" href="/chat/manifest.json">
  <meta name="theme-color" content="#06b6d4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KL Admin">
  <link rel="apple-touch-icon" href="/chat/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Kerehama Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0D0E10; --bg-soft: #141617; --bg-hover: #1a1c1e; --fg: #FFFFFF; --muted: #A9ACAF;
      --accent: #06b6d4; --accent-soft: rgba(6,182,212,0.12); --card-border: rgba(255,255,255,0.06);
      --danger: #f87171; --success: #4ade80;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; } @media all and (display-mode: standalone) { body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); } }
    body { font-family: 'Space Grotesk', system-ui, sans-serif; background: var(--bg); color: var(--fg); display: flex; flex-direction: column; }
    body::before { content:''; position:fixed; inset:-20% auto auto -25%; width:60vw; height:60vw; background:radial-gradient(circle at 30% 30%,rgba(6,182,212,0.25),transparent 70%); filter:blur(120px); opacity:0.15; pointer-events:none; z-index:0; }

    /* ── LOGIN ── */
    .login-screen { flex:1; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; }
    .login-box { display:flex; flex-direction:column; align-items:center; gap:1.5rem; max-width:360px; width:100%; padding:2rem; }
    .login-box h1 { font-size:1.5rem; font-weight:600; }
    .login-box h1 span { color:var(--accent); }
    .field-input { width:100%; padding:0.85rem 1.15rem; border:1px solid var(--card-border); border-radius:0.75rem; background:var(--bg-soft); color:var(--fg); font-family:inherit; font-size:0.95rem; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
    .field-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
    .field-input::placeholder { color:var(--muted); opacity:0.5; }
    .btn-primary { padding:0.75rem 2rem; border:1px solid var(--accent); border-radius:999px; background:transparent; color:var(--fg); font-family:inherit; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .btn-primary:hover { background:var(--accent); color:#050505; transform:translateY(-2px); }
    .login-error { color:var(--danger); font-size:0.85rem; min-height:1.2em; }

    /* ── LAYOUT ── */
    .admin-layout { display:none; flex:1; position:relative; z-index:1; overflow:hidden; }
    .admin-layout.active { display:flex; }

    /* ── SIDEBAR ── */
    .sidebar { width:340px; min-width:340px; border-right:1px solid var(--card-border); display:flex; flex-direction:column; background:var(--bg-soft); }
    .sidebar-tabs { display:flex; border-bottom:1px solid var(--card-border); }
    .sidebar-tab { flex:1; padding:0.85rem; text-align:center; font-size:0.85rem; font-weight:600; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; transition:all 0.2s; }
    .sidebar-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .sidebar-tab:hover { color:var(--fg); }
    .sidebar-content { flex:1; overflow-y:auto; }
    .sidebar-content::-webkit-scrollbar { width:5px; }
    .sidebar-content::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }

    .sidebar-header { padding:0.85rem 1.25rem; border-bottom:1px solid var(--card-border); display:flex; justify-content:space-between; align-items:center; }
    .sidebar-header h3 { font-size:0.9rem; font-weight:600; color:var(--accent); }
    .badge { color:var(--muted); font-size:0.75rem; }
    .sidebar-search { padding:0.6rem 1rem; border-bottom:1px solid var(--card-border); }
    .sidebar-search input { width:100%; padding:0.55rem 0.85rem; border:1px solid var(--card-border); border-radius:0.6rem; background:var(--bg); color:var(--fg); font-family:inherit; font-size:0.8rem; outline:none; }
    .sidebar-search input:focus { border-color:var(--accent); }
    .sidebar-search input::placeholder { color:var(--muted); opacity:0.4; }

    /* Chat items */
    .chat-item { padding:0.85rem 1.25rem; border-bottom:1px solid var(--card-border); cursor:pointer; transition:background 0.15s; }
    .chat-item:hover { background:var(--bg-hover); }
    .chat-item.active { background:var(--accent-soft); border-left:3px solid var(--accent); }
    .chat-item .top { display:flex; justify-content:space-between; align-items:center; }
    .chat-item .name { font-weight:600; font-size:0.9rem; }
    .chat-item .alias { color:var(--accent); font-size:0.7rem; margin-left:0.35rem; }
    .chat-item .email { color:var(--muted); font-size:0.75rem; margin-top:0.1rem; }
    .chat-item .time { color:var(--muted); font-size:0.7rem; white-space:nowrap; }
    .tags { display:flex; gap:0.3rem; margin-top:0.3rem; flex-wrap:wrap; }
    .tag { font-size:0.6rem; font-weight:600; padding:0.1rem 0.45rem; border-radius:999px; background:var(--accent-soft); color:var(--accent); }
    .no-items { padding:2rem; text-align:center; color:var(--muted); font-size:0.85rem; }

    /* ── MAIN PANEL ── */
    .main-panel { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }
    .panel-header { padding:0.75rem 1.25rem; border-bottom:1px solid var(--card-border); background:var(--bg-soft); display:flex; justify-content:space-between; align-items:center; }
    .panel-header .left { display:flex; flex-direction:column; gap:0.1rem; min-width:0; }
    .panel-header h3 { font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .panel-header .sub { color:var(--accent); font-size:0.75rem; text-decoration:none; }
    .toolbar { display:flex; gap:0.4rem; }
    .tb { width:34px; height:34px; border:1px solid var(--card-border); border-radius:0.5rem; background:transparent; color:var(--muted); font-size:0.95rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color 0.2s,color 0.2s; }
    .tb:hover { border-color:var(--accent); color:var(--accent); }
    .tb.active { border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
    .tb.danger:hover { border-color:var(--danger); color:var(--danger); }
    .mobile-back { display:none; color:var(--muted); text-decoration:none; font-size:0.8rem; cursor:pointer; }
    .mobile-back:hover { color:var(--accent); }

    /* Messages */
    .panel-messages { flex:1; overflow-y:auto; padding:1.25rem; display:flex; flex-direction:column; gap:0.65rem; }
    .panel-messages::-webkit-scrollbar { width:5px; }
    .panel-messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }
    .msg { max-width:75%; padding:0.8rem 1.1rem; border-radius:1rem; font-size:0.9rem; line-height:1.5; word-wrap:break-word; animation:msg-in 0.25s ease; }
    .msg.client { align-self:flex-start; background:var(--bg-soft); border:1px solid var(--card-border); border-bottom-left-radius:0.25rem; }
    .msg.admin { align-self:flex-end; background:var(--accent); color:#050505; border-bottom-right-radius:0.25rem; }
    .msg .meta { font-size:0.65rem; opacity:0.6; margin-top:0.3rem; }
    .msg.admin .meta { color:#050505; }
    .msg.summary { align-self:stretch; max-width:100%; background:rgba(6,182,212,0.06); border:1px solid rgba(6,182,212,0.15); }
    .msg.summary .label { font-size:0.7rem; color:var(--accent); font-weight:600; margin-bottom:0.3rem; }
    .msg.card-preview { align-self:flex-end; max-width:85%; background:var(--bg-soft); border:1px solid var(--accent); border-radius:1rem; }
    .msg.card-preview .card-title { font-weight:600; font-size:0.95rem; }
    .msg.card-preview .card-desc { color:var(--muted); font-size:0.85rem; margin-top:0.2rem; }
    .msg.card-preview .card-btns { display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.5rem; }
    .msg.card-preview .card-btns span { font-size:0.75rem; padding:0.3rem 0.8rem; border-radius:999px; background:var(--accent-soft); color:var(--accent); }
    .panel-empty { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:0.9rem; opacity:0.4; }

    /* Input bar */
    .admin-input { display:flex; gap:0.6rem; padding:0.85rem 1.25rem; border-top:1px solid var(--card-border); background:var(--bg-soft); }
    .admin-input input { flex:1; padding:0.75rem 1rem; border:1px solid var(--card-border); border-radius:0.75rem; background:var(--bg); color:var(--fg); font-family:inherit; font-size:0.9rem; outline:none; }
    .admin-input input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
    .admin-input input::placeholder { color:var(--muted); opacity:0.4; }
    .admin-input button { padding:0.75rem 1.25rem; border:none; border-radius:0.75rem; background:var(--accent); color:#050505; font-family:inherit; font-size:0.9rem; font-weight:600; cursor:pointer; }
    .admin-input button:disabled { opacity:0.3; cursor:not-allowed; }

    /* ── NOTES PANEL ── */
    .notes-panel { position:absolute; top:0; right:-380px; width:380px; height:100%; background:var(--bg-soft); border-left:1px solid var(--card-border); display:flex; flex-direction:column; transition:right 0.3s cubic-bezier(0.22,1,0.36,1); z-index:10; }
    .notes-panel.open { right:0; }
    .notes-panel .np-header { padding:1rem 1.25rem; border-bottom:1px solid var(--card-border); display:flex; justify-content:space-between; align-items:center; }
    .notes-panel .np-header h3 { font-size:0.95rem; font-weight:600; }
    .notes-panel .np-close { background:none; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; }
    .notes-panel .np-close:hover { color:var(--fg); }
    .notes-panel textarea { flex:1; margin:1rem; padding:1rem; border:1px solid var(--card-border); border-radius:0.75rem; background:var(--bg); color:var(--fg); font-family:inherit; font-size:0.9rem; line-height:1.6; resize:none; outline:none; }
    .notes-panel textarea:focus { border-color:var(--accent); }
    .notes-panel textarea::placeholder { color:var(--muted); opacity:0.4; }
    .notes-panel .np-status { padding:0 1.25rem 1rem; font-size:0.75rem; color:var(--muted); }

    /* ── MODALS ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--bg-soft); border:1px solid var(--card-border); border-radius:1.25rem; width:92%; max-width:560px; max-height:90vh; overflow-y:auto; padding:0; }
    .modal-head { padding:1.25rem 1.5rem; border-bottom:1px solid var(--card-border); display:flex; justify-content:space-between; align-items:center; }
    .modal-head h3 { font-size:1.05rem; font-weight:600; }
    .modal-head h3 span { color:var(--accent); }
    .modal-close { background:none; border:none; color:var(--muted); font-size:1.3rem; cursor:pointer; }
    .modal-close:hover { color:var(--fg); }
    .modal-body { padding:1.5rem; display:flex; flex-direction:column; gap:1.25rem; }
    .modal-footer { padding:1rem 1.5rem; border-top:1px solid var(--card-border); display:flex; gap:0.75rem; justify-content:flex-end; }
    .field { display:flex; flex-direction:column; gap:0.3rem; }
    .field label { font-size:0.8rem; color:var(--muted); }
    .field textarea { min-height:60px; resize:vertical; }
    .row { display:flex; gap:0.75rem; }
    .row .field { flex:1; }
    .btn-accent { padding:0.7rem 1.5rem; border:none; border-radius:999px; background:var(--accent); color:#050505; font-family:inherit; font-size:0.9rem; font-weight:600; cursor:pointer; transition:transform 0.2s; }
    .btn-accent:hover { transform:translateY(-1px); }
    .btn-ghost { padding:0.7rem 1.5rem; border:1px solid var(--card-border); border-radius:999px; background:transparent; color:var(--muted); font-family:inherit; font-size:0.9rem; cursor:pointer; }
    .btn-ghost:hover { border-color:var(--muted); }
    .btn-danger { padding:0.7rem 1.5rem; border:1px solid var(--danger); border-radius:999px; background:transparent; color:var(--danger); font-family:inherit; font-size:0.9rem; cursor:pointer; margin-right:auto; }
    .btn-danger:hover { background:var(--danger); color:#050505; }
    .btn-sm { padding:0.45rem 1rem; font-size:0.8rem; border-radius:0.5rem; cursor:pointer; border:1px solid var(--card-border); background:transparent; color:var(--muted); font-family:inherit; }
    .btn-sm:hover { border-color:var(--accent); color:var(--accent); }

    /* Card builder - button rows */
    .card-btn-row { display:flex; gap:0.5rem; align-items:center; }
    .card-btn-row input { flex:1; }
    .card-btn-row .remove-btn { width:32px; height:32px; border:1px solid var(--card-border); border-radius:0.5rem; background:transparent; color:var(--danger); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.9rem; }
    .card-btn-row .remove-btn:hover { border-color:var(--danger); }
    .style-select { padding:0.5rem; border:1px solid var(--card-border); border-radius:0.5rem; background:var(--bg); color:var(--fg); font-family:inherit; font-size:0.8rem; }

    /* Form builder */
    .form-item { padding:0.85rem 1.25rem; border-bottom:1px solid var(--card-border); cursor:pointer; transition:background 0.15s; display:flex; justify-content:space-between; align-items:center; }
    .form-item:hover { background:var(--bg-hover); }
    .form-item .fi-name { font-weight:600; font-size:0.9rem; }
    .form-item .fi-default { font-size:0.65rem; padding:0.1rem 0.5rem; border-radius:999px; background:var(--success); color:#050505; font-weight:600; }
    .form-item .fi-sections { color:var(--muted); font-size:0.75rem; }
    .section-block { border:1px solid var(--card-border); border-radius:0.75rem; overflow:hidden; }
    .section-head { padding:0.75rem 1rem; background:var(--bg-hover); display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .section-head .sec-label { font-weight:600; font-size:0.85rem; }
    .section-body { padding:0.75rem 1rem; display:flex; flex-direction:column; gap:0.65rem; }
    .q-item { padding:0.5rem 0.75rem; border:1px solid var(--card-border); border-radius:0.5rem; display:flex; justify-content:space-between; align-items:center; font-size:0.8rem; }
    .q-item .q-type { font-size:0.65rem; padding:0.1rem 0.4rem; border-radius:4px; background:var(--accent-soft); color:var(--accent); font-weight:600; margin-right:0.5rem; }
    .q-actions { display:flex; gap:0.3rem; }
    .q-actions button { width:24px; height:24px; border:1px solid var(--card-border); border-radius:4px; background:transparent; color:var(--muted); cursor:pointer; font-size:0.7rem; display:flex; align-items:center; justify-content:center; }
    .q-actions button:hover { border-color:var(--accent); color:var(--accent); }

    .no-selection { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:0.95rem; opacity:0.35; }

    @media (max-width:700px) {
      .sidebar { width:100%; min-width:unset; }
      .main-panel { display:none; }
      .admin-layout.chat-open .sidebar { display:none; }
      .admin-layout.chat-open .main-panel { display:flex; }
      .mobile-back { display:block !important; }
      .notes-panel { width:100%; right:-100%; }
    }
    @keyframes msg-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h1>Admin <span>Login</span></h1>
    <input class="field-input" type="password" id="password" placeholder="Password" autofocus>
    <button class="btn-primary" onclick="attemptLogin()">Enter →</button>
    <p class="login-error" id="login-error">&nbsp;</p>
  </div>
</div>

<!-- Admin -->
<div class="admin-layout" id="admin-layout">
  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" data-tab="chats" onclick="switchTab('chats')">💬 Chats</div>
      <div class="sidebar-tab" data-tab="forms" onclick="switchTab('forms')">📝 Forms</div>
    </div>
    <div id="tab-chats">
      <div class="sidebar-search"><input type="text" id="search-input" placeholder="Search…" autocomplete="off"></div>
      <div class="sidebar-content" id="chat-list"><div class="no-items">Loading…</div></div>
    </div>
    <div id="tab-forms" style="display:none;">
      <div class="sidebar-header"><h3>Intake Forms</h3><button class="btn-sm" onclick="createForm()">+ New</button></div>
      <div class="sidebar-content" id="form-list"><div class="no-items">Loading…</div></div>
    </div>
  </div>

  <div class="main-panel" id="main-panel">
    <div class="no-selection" id="no-selection">Select a chat or form</div>
    <!-- Notes slide panel -->
    <div class="notes-panel" id="notes-panel">
      <div class="np-header"><h3>📝 Notes</h3><button class="np-close" onclick="toggleNotes()">✕</button></div>
      <textarea id="notes-textarea" placeholder="Write private notes about this client…"></textarea>
      <div class="np-status" id="notes-status">Auto-saves as you type</div>
    </div>
  </div>
</div>

<!-- Card Builder Modal -->
<div class="modal-overlay" id="card-modal" onclick="if(event.target===this)closeCardModal()">
  <div class="modal">
    <div class="modal-head"><h3>Send a <span>Card</span></h3><button class="modal-close" onclick="closeCardModal()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Title</label><input class="field-input" id="card-title" placeholder="e.g. Your proposal is ready"></div>
      <div class="field"><label>Description</label><textarea class="field-input" id="card-desc" placeholder="Optional description…"></textarea></div>
      <div class="field"><label>Buttons</label><div id="card-buttons-list"></div></div>
      <button class="btn-sm" onclick="addCardButton()">+ Add Button</button>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeCardModal()">Cancel</button>
      <button class="btn-accent" onclick="sendCard()">Send Card</button>
    </div>
  </div>
</div>

<!-- Chat Detail Modal -->
<div class="modal-overlay" id="detail-modal" onclick="if(event.target===this)closeDetailModal()">
  <div class="modal" id="detail-content"></div>
</div>

<!-- Form Editor Modal -->
<div class="modal-overlay" id="form-modal" onclick="if(event.target===this)closeFormModal()">
  <div class="modal" style="max-width:640px;" id="form-content"></div>
</div>

<!-- Question Editor Modal -->
<div class="modal-overlay" id="q-modal" onclick="if(event.target===this)closeQModal()">
  <div class="modal" id="q-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://ewlufiwgnnnfwdjoafcu.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3bHVmaXdnbm5uZndkam9hZmN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTI3MTMsImV4cCI6MjA5MDQ4ODcxM30.C8XNhInLONhDYtt0twygGFg0M4sufZI3oyCTeFjoP-Y';
const ADMIN_PASS = 'Hello123';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let chats = [], forms = [], currentChatId = null, currentFormId = null, searchTerm = '';
const renderedMsgIds = new Set();
let notesSaveTimer = null;

// ── AUTH ──
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
function attemptLogin() {
  if (document.getElementById('password').value === ADMIN_PASS) {
    sessionStorage.setItem('admin_auth', 'true');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-layout').classList.add('active');
    loadChats(); loadForms(); subscribeToAll();
  } else { document.getElementById('login-error').textContent = 'Wrong password'; }
}
if (sessionStorage.getItem('admin_auth') === 'true') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-layout').classList.add('active');
  loadChats(); loadForms(); subscribeToAll();
}

// ── HELPERS ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function timeAgo(ts) { const m = Math.floor((Date.now() - new Date(ts).getTime()) / 60000); if (m < 1) return 'now'; if (m < 60) return m + 'm'; const h = Math.floor(m / 60); if (h < 24) return h + 'h'; return Math.floor(h / 24) + 'd'; }
function formatTime(ts) { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function dname(c) { return c.display_name || c.client_name; }

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('tab-chats').style.display = tab === 'chats' ? '' : 'none';
  document.getElementById('tab-forms').style.display = tab === 'forms' ? '' : 'none';
}

// ── SEARCH ──
document.getElementById('search-input').addEventListener('input', e => { searchTerm = e.target.value.toLowerCase(); renderChatList(); });

// ══════════════════════════════════
// CHATS
// ══════════════════════════════════
async function loadChats() {
  const { data } = await sb.from('chats').select('*').order('last_message_at', { ascending: false });
  chats = data || []; renderChatList();
}

function renderChatList() {
  const list = document.getElementById('chat-list');
  let filtered = chats;
  if (searchTerm) filtered = chats.filter(c => [c.client_name, c.display_name, c.client_email, ...(c.tags || [])].some(v => (v || '').toLowerCase().includes(searchTerm)));

  if (!filtered.length) { list.innerHTML = `<div class="no-items">${searchTerm ? 'No matches' : 'No chats yet'}</div>`; return; }
  list.innerHTML = filtered.map(c => `
    <div class="chat-item ${c.id === currentChatId ? 'active' : ''}" onclick="openChat('${c.id}')">
      <div class="top">
        <div><div class="name">${esc(dname(c))}${c.display_name ? `<span class="alias">(${esc(c.client_name)})</span>` : ''}</div><div class="email">${esc(c.client_email)}</div></div>
        <span class="time">${timeAgo(c.last_message_at)}</span>
      </div>
      ${(c.tags?.length) ? `<div class="tags">${c.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');
}

async function openChat(id) {
  currentChatId = id; currentFormId = null;
  renderedMsgIds.clear();
  const chat = chats.find(c => c.id === id);
  document.getElementById('admin-layout').classList.add('chat-open');
  renderChatList();

  const panel = document.getElementById('main-panel');
  // Keep notes panel
  const notesPanel = document.getElementById('notes-panel');

  panel.innerHTML = `
    <div class="panel-header">
      <div class="left">
        <span class="mobile-back" onclick="closeChat()">← Back</span>
        <h3>${esc(dname(chat))}</h3>
        <a class="sub" href="mailto:${esc(chat.client_email)}">${esc(chat.client_email)}</a>
      </div>
      <div class="toolbar">
        <button class="tb" onclick="toggleNotes()" title="Notes" id="notes-btn">📝</button>
        <button class="tb" onclick="openCardModal()" title="Send card">🃏</button>
        <button class="tb" onclick="openDetailModal('${id}')" title="Edit details">✏️</button>
        <button class="tb" onclick="copyLink('${id}')" title="Copy link" id="copy-btn">🔗</button>
      </div>
    </div>
    <div class="panel-messages" id="panel-messages"></div>
    <div class="admin-input">
      <input class="field-input" type="text" id="admin-msg" placeholder="Reply as Kerehama…" autocomplete="off">
      <button onclick="sendAdminMsg()">Send</button>
    </div>
  `;
  panel.appendChild(notesPanel);

  document.getElementById('admin-msg').addEventListener('keydown', e => { if (e.key === 'Enter') sendAdminMsg(); });
  document.getElementById('admin-msg').focus();

  // Load notes
  const notesArea = document.getElementById('notes-textarea');
  notesArea.value = chat.notes || '';
  notesArea.oninput = () => { clearTimeout(notesSaveTimer); document.getElementById('notes-status').textContent = 'Saving…'; notesSaveTimer = setTimeout(() => saveNotes(id, notesArea.value), 800); };

  // Load messages
  const { data: msgs } = await sb.from('messages').select('*').eq('chat_id', id).order('created_at', { ascending: true });
  const container = document.getElementById('panel-messages');
  if (!msgs?.length) { container.innerHTML = '<div class="panel-empty">No messages yet</div>'; }
  else { container.innerHTML = ''; msgs.forEach(m => appendMsg(m, chat)); container.scrollTop = container.scrollHeight; }
}

function appendMsg(m, chat) {
  if (renderedMsgIds.has(m.id)) return;
  renderedMsgIds.add(m.id);
  const container = document.getElementById('panel-messages');
  if (!container) return;
  const empty = container.querySelector('.panel-empty');
  if (empty) empty.remove();

  let content = m.content || '';
  const isSummary = content.startsWith('__SUMMARY__');
  const isCard = content.startsWith('__CARD__');

  if (isSummary) {
    content = content.replace('__SUMMARY__\n', '');
    const div = document.createElement('div');
    div.className = 'msg summary';
    div.innerHTML = `<div class="label">📋 INTAKE SUMMARY</div><div class="text">${esc(content).replace(/\n/g, '<br>')}</div><div class="meta">${formatTime(m.created_at)}</div>`;
    container.appendChild(div);
  } else if (isCard) {
    try {
      const cd = JSON.parse(content.replace('__CARD__', ''));
      const div = document.createElement('div');
      div.className = 'msg card-preview';
      div.innerHTML = `
        ${cd.title ? `<div class="card-title">${esc(cd.title)}</div>` : ''}
        ${cd.desc ? `<div class="card-desc">${esc(cd.desc)}</div>` : ''}
        ${cd.buttons?.length ? `<div class="card-btns">${cd.buttons.map(b => `<span>${esc(b.label)}</span>`).join('')}</div>` : ''}
        <div class="meta">Card · ${formatTime(m.created_at)}</div>
      `;
      container.appendChild(div);
    } catch (e) {}
  } else {
    const div = document.createElement('div');
    div.className = `msg ${m.sender}`;
    div.innerHTML = `<div class="text">${esc(content).replace(/\n/g, '<br>')}</div><div class="meta">${m.sender === 'client' ? esc(chat?.client_name || 'Client') : 'You'} · ${formatTime(m.created_at)}</div>`;
    container.appendChild(div);
  }
  container.scrollTop = container.scrollHeight;
}

function closeChat() {
  currentChatId = null; renderedMsgIds.clear();
  document.getElementById('admin-layout').classList.remove('chat-open');
  document.getElementById('main-panel').innerHTML = '<div class="no-selection">Select a chat or form</div>';
  document.getElementById('main-panel').appendChild(document.getElementById('notes-panel') || createNotesPanel());
  document.getElementById('notes-panel').classList.remove('open');
  renderChatList();
}

async function sendAdminMsg() {
  const input = document.getElementById('admin-msg');
  const text = input.value.trim();
  if (!text || !currentChatId) return;
  input.value = '';
  const { data } = await sb.from('messages').insert({ chat_id: currentChatId, sender: 'admin', content: text }).select().single();
  if (data) appendMsg(data, chats.find(c => c.id === currentChatId));
  await sb.from('chats').update({ last_message_at: new Date().toISOString() }).eq('id', currentChatId);
  input.focus();
}

// ── NOTES ──
function toggleNotes() {
  const panel = document.getElementById('notes-panel');
  panel.classList.toggle('open');
  const btn = document.getElementById('notes-btn');
  if (btn) btn.classList.toggle('active', panel.classList.contains('open'));
}

async function saveNotes(chatId, text) {
  await sb.from('chats').update({ notes: text }).eq('id', chatId);
  const chat = chats.find(c => c.id === chatId);
  if (chat) chat.notes = text;
  document.getElementById('notes-status').textContent = '✓ Saved';
}

// ── COPY LINK ──
function copyLink(id) {
  navigator.clipboard.writeText(`https://labs.kerehama.nz/chat/${id}`);
  const btn = document.getElementById('copy-btn');
  if (btn) { btn.textContent = '✅'; setTimeout(() => btn.textContent = '🔗', 1500); }
}

// ── DETAIL MODAL ──
function openDetailModal(id) {
  const chat = chats.find(c => c.id === id);
  if (!chat) return;
  document.getElementById('detail-content').innerHTML = `
    <div class="modal-head"><h3>Edit <span>${esc(chat.client_name)}</span></h3><button class="modal-close" onclick="closeDetailModal()">✕</button></div>
    <div class="modal-body">
      <div style="font-size:0.8rem;color:var(--muted);">🔗 https://labs.kerehama.nz/chat/${chat.id}</div>
      <div class="row"><div class="field"><label>Display Name</label><input class="field-input" id="d-name" value="${esc(chat.display_name || '')}" placeholder="Override name…"></div><div class="field"><label>Original</label><input class="field-input" value="${esc(chat.client_name)}" disabled style="opacity:0.4;"></div></div>
      <div class="field"><label>Tags (comma separated)</label><input class="field-input" id="d-tags" value="${esc((chat.tags || []).join(', '))}" placeholder="client, urgent, friend"></div>
    </div>
    <div class="modal-footer"><button class="btn-danger" onclick="deleteChat('${chat.id}')">Delete</button><button class="btn-ghost" onclick="closeDetailModal()">Cancel</button><button class="btn-accent" onclick="saveDetail('${chat.id}')">Save</button></div>
  `;
  document.getElementById('detail-modal').classList.add('open');
}
function closeDetailModal() { document.getElementById('detail-modal').classList.remove('open'); }
async function saveDetail(id) {
  const displayName = document.getElementById('d-name').value.trim() || null;
  const tags = document.getElementById('d-tags').value.split(',').map(t => t.trim()).filter(Boolean);
  await sb.from('chats').update({ display_name: displayName, tags }).eq('id', id);
  const chat = chats.find(c => c.id === id);
  if (chat) { chat.display_name = displayName; chat.tags = tags; }
  closeDetailModal(); renderChatList();
  if (currentChatId === id) openChat(id);
}
async function deleteChat(id) {
  if (!confirm('Delete this chat and all messages?')) return;
  await sb.from('messages').delete().eq('chat_id', id);
  await sb.from('chats').delete().eq('id', id);
  chats = chats.filter(c => c.id !== id);
  closeDetailModal();
  if (currentChatId === id) closeChat();
  renderChatList();
}

// ══════════════════════════════════
// CARD BUILDER
// ══════════════════════════════════
let cardButtons = [];

function openCardModal() {
  cardButtons = [{ label: '', url: '', style: 'primary' }];
  document.getElementById('card-title').value = '';
  document.getElementById('card-desc').value = '';
  renderCardButtons();
  document.getElementById('card-modal').classList.add('open');
}
function closeCardModal() { document.getElementById('card-modal').classList.remove('open'); }

function addCardButton() { cardButtons.push({ label: '', url: '', style: 'secondary' }); renderCardButtons(); }

function renderCardButtons() {
  const list = document.getElementById('card-buttons-list');
  list.innerHTML = cardButtons.map((b, i) => `
    <div class="card-btn-row" style="margin-bottom:0.5rem;">
      <input class="field-input" placeholder="Label" value="${esc(b.label)}" oninput="cardButtons[${i}].label=this.value">
      <input class="field-input" placeholder="URL" value="${esc(b.url)}" oninput="cardButtons[${i}].url=this.value">
      <select class="style-select" onchange="cardButtons[${i}].style=this.value">
        <option value="primary" ${b.style === 'primary' ? 'selected' : ''}>Primary</option>
        <option value="secondary" ${b.style === 'secondary' ? 'selected' : ''}>Secondary</option>
      </select>
      ${cardButtons.length > 1 ? `<button class="remove-btn" onclick="cardButtons.splice(${i},1);renderCardButtons()">✕</button>` : ''}
    </div>
  `).join('');
}

async function sendCard() {
  const title = document.getElementById('card-title').value.trim();
  const desc = document.getElementById('card-desc').value.trim();
  const buttons = cardButtons.filter(b => b.label.trim());
  if (!title && !desc) return alert('Add a title or description');

  const cardData = { title, desc, buttons };
  const content = '__CARD__' + JSON.stringify(cardData);

  await sb.from('messages').insert({ chat_id: currentChatId, sender: 'admin', content });
  await sb.from('chats').update({ last_message_at: new Date().toISOString() }).eq('id', currentChatId);

  closeCardModal();
}

// ══════════════════════════════════
// FORM BUILDER
// ══════════════════════════════════
async function loadForms() {
  try {
    const { data } = await sb.from('forms').select('*').order('created_at', { ascending: false });
    forms = data || [];
  } catch (e) { forms = []; }
  renderFormList();
}

function renderFormList() {
  const list = document.getElementById('form-list');
  if (!forms.length) { list.innerHTML = '<div class="no-items">No forms yet — create one!</div>'; return; }
  list.innerHTML = forms.map(f => `
    <div class="form-item" onclick="editForm('${f.id}')">
      <div><div class="fi-name">${esc(f.name)}</div><div class="fi-sections">${(f.sections || []).length} section(s)</div></div>
      ${f.is_default ? '<span class="fi-default">DEFAULT</span>' : ''}
    </div>
  `).join('');
}

async function createForm() {
  const { data } = await sb.from('forms').insert({ name: 'New Form', greeting: 'Hey {name}! 👋 Welcome', sections: [] }).select().single();
  if (data) { forms.unshift(data); renderFormList(); editForm(data.id); }
}

function editForm(id) {
  currentFormId = id;
  const form = forms.find(f => f.id === id);
  if (!form) return;

  const modal = document.getElementById('form-content');
  modal.innerHTML = `
    <div class="modal-head"><h3>Edit <span>${esc(form.name)}</span></h3><button class="modal-close" onclick="closeFormModal()">✕</button></div>
    <div class="modal-body">
      <div class="row">
        <div class="field"><label>Form Name</label><input class="field-input" id="f-name" value="${esc(form.name)}"></div>
        <div class="field" style="flex:0 0 auto;align-self:flex-end;">
          <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;">
            <input type="checkbox" id="f-default" ${form.is_default ? 'checked' : ''}> Default
          </label>
        </div>
      </div>
      <div class="field"><label>Greeting (use {name} for client's name)</label><input class="field-input" id="f-greeting" value="${esc(form.greeting || '')}" placeholder="Hey {name}! 👋"></div>
      <div class="field"><label>Sections</label><div id="f-sections"></div></div>
      <button class="btn-sm" onclick="addSection()">+ Add Section</button>
    </div>
    <div class="modal-footer"><button class="btn-danger" onclick="deleteForm('${id}')">Delete</button><button class="btn-ghost" onclick="closeFormModal()">Cancel</button><button class="btn-accent" onclick="saveForm('${id}')">Save Form</button></div>
  `;
  renderSections();
  document.getElementById('form-modal').classList.add('open');
}

function closeFormModal() { document.getElementById('form-modal').classList.remove('open'); currentFormId = null; }

function getEditingForm() { return forms.find(f => f.id === currentFormId); }

function renderSections() {
  const form = getEditingForm();
  if (!form) return;
  const container = document.getElementById('f-sections');
  if (!form.sections?.length) { container.innerHTML = '<div class="no-items" style="padding:1rem;">No sections yet</div>'; return; }

  container.innerHTML = form.sections.map((s, si) => `
    <div class="section-block" style="margin-bottom:0.75rem;">
      <div class="section-head">
        <div>
          <span class="sec-label">${esc(s.label)}</span>
          <span style="color:var(--muted);font-size:0.7rem;margin-left:0.5rem;">${(s.questions || []).length} q</span>
        </div>
        <div class="q-actions">
          <button onclick="editSection(${si})" title="Edit">✏️</button>
          <button onclick="removeSection(${si})" title="Remove">🗑️</button>
        </div>
      </div>
      <div class="section-body">
        ${(s.questions || []).map((q, qi) => `
          <div class="q-item">
            <div><span class="q-type">${q.type}</span>${esc(q.text)}</div>
            <div class="q-actions">
              <button onclick="editQuestion(${si},${qi})">✏️</button>
              <button onclick="removeQuestion(${si},${qi})">🗑️</button>
              ${qi > 0 ? `<button onclick="moveQuestion(${si},${qi},-1)">↑</button>` : ''}
              ${qi < s.questions.length - 1 ? `<button onclick="moveQuestion(${si},${qi},1)">↓</button>` : ''}
            </div>
          </div>
        `).join('')}
        <button class="btn-sm" onclick="addQuestion(${si})" style="margin-top:0.4rem;">+ Add Question</button>
      </div>
    </div>
  `).join('');
}

function addSection() {
  const form = getEditingForm();
  if (!form) return;
  if (!form.sections) form.sections = [];
  form.sections.push({ label: '📦 New Section', value: 'new-section', questions: [] });
  renderSections();
}

function editSection(si) {
  const form = getEditingForm();
  const s = form.sections[si];
  const label = prompt('Section label (with emoji):', s.label);
  if (label === null) return;
  const value = prompt('Section value (slug):', s.value);
  if (value === null) return;
  s.label = label; s.value = value;
  renderSections();
}

function removeSection(si) {
  if (!confirm('Remove this section?')) return;
  getEditingForm().sections.splice(si, 1);
  renderSections();
}

function addQuestion(si) {
  openQModal(si, -1);
}

function editQuestion(si, qi) {
  openQModal(si, qi);
}

function removeQuestion(si, qi) {
  getEditingForm().sections[si].questions.splice(qi, 1);
  renderSections();
}

function moveQuestion(si, qi, dir) {
  const qs = getEditingForm().sections[si].questions;
  const ni = qi + dir;
  if (ni < 0 || ni >= qs.length) return;
  [qs[qi], qs[ni]] = [qs[ni], qs[qi]];
  renderSections();
}

// Question editor modal
function openQModal(si, qi) {
  const form = getEditingForm();
  const isNew = qi === -1;
  const q = isNew ? { type: 'text', text: '', placeholder: '', key: '' } : { ...form.sections[si].questions[qi] };
  const opts = q.options || [{ label: '', value: '' }];

  document.getElementById('q-content').innerHTML = `
    <div class="modal-head"><h3>${isNew ? 'Add' : 'Edit'} <span>Question</span></h3><button class="modal-close" onclick="closeQModal()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Type</label>
        <select class="field-input" id="q-type" onchange="toggleQOptions()">
          <option value="text" ${q.type === 'text' ? 'selected' : ''}>Text Input</option>
          <option value="choice" ${q.type === 'choice' ? 'selected' : ''}>Choice Buttons</option>
        </select>
      </div>
      <div class="field"><label>Question Text</label><input class="field-input" id="q-text" value="${esc(q.text)}" placeholder="What's the business name?"></div>
      <div class="row">
        <div class="field"><label>Key (for summary)</label><input class="field-input" id="q-key" value="${esc(q.key || '')}" placeholder="e.g. Business Name"></div>
        <div class="field"><label>Placeholder</label><input class="field-input" id="q-placeholder" value="${esc(q.placeholder || '')}" placeholder="Placeholder text…"></div>
      </div>
      <div id="q-options-section" style="display:${q.type === 'choice' ? '' : 'none'};">
        <div class="field"><label>Options</label><div id="q-options-list"></div></div>
        <button class="btn-sm" onclick="addQOption()" style="margin-top:0.4rem;">+ Add Option</button>
      </div>
    </div>
    <div class="modal-footer"><button class="btn-ghost" onclick="closeQModal()">Cancel</button><button class="btn-accent" onclick="saveQuestion(${si},${qi})">Save</button></div>
  `;
  window._qOpts = [...opts];
  renderQOptions();
  document.getElementById('q-modal').classList.add('open');
}

function closeQModal() { document.getElementById('q-modal').classList.remove('open'); }

function toggleQOptions() {
  document.getElementById('q-options-section').style.display = document.getElementById('q-type').value === 'choice' ? '' : 'none';
}

function renderQOptions() {
  const list = document.getElementById('q-options-list');
  if (!list) return;
  list.innerHTML = window._qOpts.map((o, i) => `
    <div class="card-btn-row" style="margin-bottom:0.4rem;">
      <input class="field-input" placeholder="Label" value="${esc(o.label)}" oninput="window._qOpts[${i}].label=this.value">
      <input class="field-input" placeholder="Value (optional)" value="${esc(o.value || '')}" oninput="window._qOpts[${i}].value=this.value">
      ${window._qOpts.length > 1 ? `<button class="remove-btn" onclick="window._qOpts.splice(${i},1);renderQOptions()">✕</button>` : ''}
    </div>
  `).join('');
}

function addQOption() { window._qOpts.push({ label: '', value: '' }); renderQOptions(); }

function saveQuestion(si, qi) {
  const form = getEditingForm();
  const q = {
    type: document.getElementById('q-type').value,
    text: document.getElementById('q-text').value.trim(),
    key: document.getElementById('q-key').value.trim(),
    placeholder: document.getElementById('q-placeholder').value.trim(),
  };
  if (!q.text) return alert('Question text is required');
  if (q.type === 'choice') {
    q.options = window._qOpts.filter(o => o.label.trim()).map(o => ({ label: o.label, value: o.value || o.label }));
    if (!q.options.length) return alert('Add at least one option');
  }
  if (qi === -1) form.sections[si].questions.push(q);
  else form.sections[si].questions[qi] = q;
  closeQModal();
  renderSections();
}

async function saveForm(id) {
  const name = document.getElementById('f-name').value.trim();
  const greeting = document.getElementById('f-greeting').value.trim();
  const isDefault = document.getElementById('f-default').checked;
  const form = getEditingForm();

  if (isDefault) {
    // Unset other defaults
    await sb.from('forms').update({ is_default: false }).neq('id', id);
    forms.forEach(f => { if (f.id !== id) f.is_default = false; });
  }

  await sb.from('forms').update({ name, greeting, is_default: isDefault, sections: form.sections }).eq('id', id);
  form.name = name; form.greeting = greeting; form.is_default = isDefault;

  closeFormModal(); renderFormList();
}

async function deleteForm(id) {
  if (!confirm('Delete this form?')) return;
  await sb.from('forms').delete().eq('id', id);
  forms = forms.filter(f => f.id !== id);
  closeFormModal(); renderFormList();
}

// ══════════════════════════════════
// REAL-TIME
// ══════════════════════════════════
function subscribeToAll() {
  sb.channel('admin-all')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
      const msg = payload.new;
      const chat = chats.find(c => c.id === msg.chat_id);
      if (chat) {
        chat.last_message_at = msg.created_at;
        chats.sort((a, b) => new Date(b.last_message_at) - new Date(a.last_message_at));
        renderChatList();
      }
      if (msg.chat_id === currentChatId) appendMsg(msg, chat);
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chats' }, (payload) => {
      chats.unshift(payload.new); renderChatList();
    })
    .subscribe();
}
</script>

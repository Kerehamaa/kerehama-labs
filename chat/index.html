<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Chat with Kerehama — labs.kerehama.nz">
  <title>Chat — Kerehama Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0D0E10;
      --bg-soft: #141617;
      --fg: #FFFFFF;
      --muted: #A9ACAF;
      --accent: #06b6d4;
      --accent-soft: rgba(6, 182, 212, 0.12);
      --card-border: rgba(255, 255, 255, 0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: -20% auto auto -25%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle at 30% 30%, rgba(6,182,212,0.25), transparent 70%);
      filter: blur(120px);
      opacity: 0.45;
      animation: float-pulse 18s ease-in-out infinite alternate;
      pointer-events: none; z-index: 0;
    }
    .cursor-glow {
      position: fixed; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.15), transparent 70%);
      pointer-events: none; z-index: -1; transform: translate(-50%, -50%); filter: blur(40px);
    }
    .portal {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      gap: 2rem; padding: 2rem; max-width: 420px; width: 100%;
      opacity: 0; transform: translateY(35px);
      animation: fade-up 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .brand { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .brand .eyebrow { text-transform: uppercase; letter-spacing: 0.25em; font-size: 0.75rem; color: var(--muted); }
    .brand h1 { font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 600; line-height: 1.1; }
    .brand h1 span { color: var(--accent); }
    .brand .subtitle { color: var(--muted); font-size: 0.95rem; margin-top: 0.25rem; text-align: center; }
    form { display: flex; flex-direction: column; gap: 1rem; width: 100%; }
    .input-wrapper { width: 100%; }
    .input-wrapper input {
      width: 100%; padding: 1rem 1.35rem;
      border: 1px solid var(--card-border); border-radius: 1rem;
      background: var(--bg-soft); color: var(--fg);
      font-family: inherit; font-size: 1rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper input::placeholder { color: var(--muted); opacity: 0.6; }
    .input-wrapper input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .go-btn {
      padding: 0.85rem 2.5rem; border: 1px solid var(--accent); border-radius: 999px;
      background: transparent; color: var(--fg); font-family: inherit;
      font-size: 1rem; font-weight: 600; cursor: pointer; align-self: center;
      transition: background 0.2s, color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .go-btn:hover { background: var(--accent); color: #050505; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(6,182,212,0.25); }
    .go-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg { color: #f87171; font-size: 0.85rem; min-height: 1.2em; text-align: center; }
    .footer-note { color: var(--muted); font-size: 0.8rem; opacity: 0.5; }
    .footer-note a { color: var(--muted); text-decoration: underline; }
    .footer-note a:hover { color: var(--accent); }
    @keyframes fade-up { from { opacity: 0; transform: translateY(35px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float-pulse { 0% { opacity: 0.2; transform: scale(1); } 100% { opacity: 0.5; transform: translate3d(60px,40px,0) scale(1.1); } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
    .shake { animation: shake 0.4s ease; }
    @media (prefers-reduced-motion: reduce) { body::before { animation: none; } .portal { opacity: 1; transform: none; animation: none; } }
  </style>
</head>
<body>
  <div class="cursor-glow" id="cursor-glow"></div>
  <div class="portal">
    <div class="brand">
      <p class="eyebrow">Kerehama Labs</p>
      <h1>Start a <span>Chat</span></h1>
      <p class="subtitle">Enter your details and I'll get back to you</p>
    </div>
    <form id="chat-form">
      <div class="input-wrapper">
        <input type="text" id="name" placeholder="Your name" autocomplete="name" required autofocus>
      </div>
      <div class="input-wrapper">
        <input type="email" id="email" placeholder="Your email" autocomplete="email" required>
      </div>
      <button type="submit" class="go-btn" id="submit-btn">Start Chat →</button>
      <p class="error-msg" id="error-msg">&nbsp;</p>
    </form>
    <p class="footer-note"><a href="https://kerehama.nz">kerehama.nz</a></p>
  </div>
  <script>
    const glow = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', e => { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });
    if ('ontouchstart' in window) glow.style.display = 'none';

    const form = document.getElementById('chat-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      if (!name || !email) {
        errorMsg.textContent = 'Please fill in both fields';
        form.classList.add('shake');
        setTimeout(() => form.classList.remove('shake'), 400);
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating chat…';
      errorMsg.innerHTML = '&nbsp;';
      try {
        const res = await fetch('/.netlify/functions/create-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong');
        window.location.href = '/chat/' + data.id;
      } catch (err) {
        errorMsg.textContent = err.message;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Start Chat →';
      }
    });

    document.querySelectorAll('input').forEach(el => el.addEventListener('input', () => { errorMsg.innerHTML = '&nbsp;'; }));
  </script>
</body>
</html>
